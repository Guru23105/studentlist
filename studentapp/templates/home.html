<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fb;
        }

        .container {
            margin-top: 40px;
        }

        .card {
            padding: 20px;
            border-radius: 15px;
        }

        table {
            background: white;
        }

        th {
            background-color: #0d6efd;
            color: white;
        }

        .btn-space {
            margin-right: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card shadow">

        <h2 class="text-center mb-4">🎓 Student Management System</h2>

        <!-- ACTION BUTTONS -->
        <div class="mb-3 text-end">

            <a href="/add/" class="btn btn-success btn-space">➕ Add Student</a>

            <a href="/upload/" class="btn btn-warning btn-space">📤 Upload Excel</a>

            <a href="/download/" class="btn btn-primary btn-space">📥 Download Excel</a>

            <!-- FIXED LOGOUT (POST METHOD - SAFE) -->
            <form method="POST" action="/logout/" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Logout</button>
            </form>

        </div>

        <!-- TABLE -->
        <table class="table table-bordered table-hover text-center">

            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Course</th>
                <th>Actions</th>
            </tr>

            {% for s in students %}
            <tr>
                <td>{{ s.name }}</td>
                <td>{{ s.age }}</td>
                <td>{{ s.course }}</td>
                <td>
                    <a href="/update/{{ s.id }}/" class="btn btn-primary btn-sm">Edit</a>
                    <a href="/delete/{{ s.id }}/" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}

        </table>

    </div>
</div>

</body>
</html>
