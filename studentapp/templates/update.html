<!DOCTYPE html>
<html>
<head>
    <title>Update Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f5f7fb;
        }

        .form-box{
            width:500px;
            margin:auto;
            margin-top:60px;
            background:white;
            padding:30px;
            border-radius:15px;
        }
    </style>
</head>

<body>

<div class="form-box shadow">

    <h2 class="text-center mb-4">✏ Edit Student</h2>

    <form method="POST">

        {% csrf_token %}

        <label>Name</label>
        <input
            type="text"
            name="name"
            value="{{ student.name }}"
            class="form-control mb-3"
            required
        >

        <label>Age</label>
        <input
            type="number"
            name="age"
            value="{{ student.age }}"
            class="form-control mb-3"
            required
        >

        <label>Course</label>
        <input
            type="text"
            name="course"
            value="{{ student.course }}"
            class="form-control mb-4"
            required
        >

        <button type="submit" class="btn btn-primary w-100">
            Update Student
        </button>

    </form>

    <div class="text-center mt-3">
        <a href="/" class="btn btn-secondary">
            ⬅ Back To Home
        </a>
    </div>

</div>

</body>
</html>
